# Render deployment configuration
# https://render.com/docs/blueprint-spec
#
# Deploy this by connecting your GitHub repo to Render and
# pointing it at this render.yaml file.

services:
  - type: web
    name: sports-collector
    runtime: docker
    dockerfilePath: ./sports-collector/Dockerfile
    dockerContext: ./sports-collector
    plan: free          # upgrade to starter ($7/mo) for always-on
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: sports-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: sports-redis
          type: redis
          property: connectionString
      - key: SPORTS_PROVIDER
        value: mock           # change to api-football once you have a key
      - key: API_FOOTBALL_KEY
        sync: false           # set this manually in the Render dashboard
      - key: LEAGUES_TO_TRACK
        value: "39,140,135,78,61,2"
      - key: CURRENT_SEASON
        value: "2024"

databases:
  - name: sports-db
    plan: free
    databaseName: sportsdb
    user: sports

# Render managed Redis (free tier)
# Note: Render free Redis expires after 30 days of inactivity
# For production use the starter plan
services:
  - type: redis
    name: sports-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
